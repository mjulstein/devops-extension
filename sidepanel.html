<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>DevOps Daily Export</title>
    <link rel="stylesheet" href="sidepanel.css"/>
</head>
<body>
<div class="wrap">
    <h1>DevOps Daily Export</h1>

    <details class="card">
        <summary>
            <h2>Settings</h2>
        </summary>
        <p>https://dev.azure.com/[organization]/[project]</p>
        <label>
            Organization
            <input id="organizationInput" type="text" placeholder="[organization]"/>
        </label>

        <label>
            Project
            <input id="projectInput" type="text" placeholder="[project]"/>
        </label>

        <label>
            Assigned to
            <input id="assignedToInput" type="text" placeholder="John Doe"/>
        </label>

        <button id="saveSettingsBtn">Save settings</button>
    </details>

    <section class="card">
        <h2>Status</h2>
        <div class="button-row">
            <button id="testBtn">Test button</button>
            <button id="pingPageBtn">Ping current page</button>
            <button id="testApiBtn">Test Azure DevOps API</button>
            <button id="fetchWorkItemsBtn">Fetch work items</button>
        </div>

        <div id="loadingState" class="loading hidden">Loading…</div>
        <details id="debugDetails">
            <summary>Raw response</summary>
            <pre id="debugOutput">Waiting…</pre>
        </details>
        <div id="output"></div>

    </section>


</div>

<script src="sidepanel.js"></script>
</body>
</html>
