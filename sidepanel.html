<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>DevOps Daily Export</title>
    <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
<div class="wrap">
    <h1>DevOps Daily Export</h1>

    <section class="card">
        <h2>Settings</h2>
        <p>https://dev.azure.com/[organization]/[project]</p>
        <label>
            Organization
            <input id="organizationInput" type="text" placeholder="[organization]" />
        </label>

        <label>
            Project
            <input id="projectInput" type="text" placeholder="[project]" />
        </label>

        <label>
            Assigned to
            <input id="assignedToInput" type="text" placeholder="John Doe" />
        </label>

        <button id="saveSettingsBtn">Save settings</button>
    </section>

    <section class="card">
        <h2>Status</h2>
        <button id="testBtn">Test button</button>
        <pre id="output">Waiting…</pre>
    </section>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
